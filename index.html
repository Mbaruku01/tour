<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overflow-x: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .float-element {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: float Up linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
        }
        .pulse-soft {
            animation: softPulse 2s infinite ease-in-out;
        }
        @keyframes softPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-rose-600 via-pink-500 to-red-400 min-h-screen flex items-center justify-center p-4 relative antialiased overflow-x-hidden">

    <div id="floating-assets" class="absolute inset-0 overflow-hidden select-none pointer-events-none z-0"></div>

    <audio id="bgMusic" loop>
        <source src="Billie Eilish - WILDFLOWER (COLORS Performance).mp3" type="audio/mpeg">
    </audio>

    <div id="music-gate" class="fixed inset-0 bg-black/70 backdrop-blur-xl z-50 flex flex-col items-center justify-center text-center p-6 text-white">
        <div class="glass max-w-sm rounded-3xl p-8 shadow-2xl mx-4 space-y-6 text-center border border-white/20">
            <div class="text-6xl animate-bounce">🎵</div>
            <h2 class="text-2xl font-black tracking-tight">Turn On The Vibe</h2>
            <p class="text-sm text-pink-200">This experience comes with a special soundtrack. Tap below to unmute and start!</p>
            <button onclick="unlockMusic()" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition pulse-soft">
                🎵 Play Music & Enter ❤️
            </button>
        </div>
    </div>

    <div class="w-full max-w-md z-10 my-auto">
        <div id="card" class="glass rounded-3xl shadow-2xl p-6 md:p-8 text-center text-white relative overflow-hidden min-h-[450px] flex flex-col justify-center">
            </div>
    </div>

    <script>
        const card = document.getElementById("card");
        const bgMusic = document.getElementById("bgMusic");
        
        let noCounter = 0;
        let currentQuestion = 0;
        const answers = {};

        // 10 Choice Questions + 5 Filling Questions = 15 Total
        const questions = [
            { type: "choice", key: "place", title: "What kind of date sounds best? 🗓️", options: ["🌊 Romantic Beach", "🌳 Quiet Nature Walk", "☕ Cozy Coffee Shop", "🍽️ Candlelit Dinner", "🎬 VIP Movie Night"] },
            { type: "choice", key: "time", title: "What time do you enjoy most? ⏰", options: ["🌅 Golden Sunrise", "☀️ Warm Afternoon", "🌇 Cozy Sunset", "🌙 Midnight Drive"] },
            { type: "choice", key: "color", title: "What color vibe should I wear? 👗", options: ["🖤 Elegant Black", "🤍 Clean White", "💙 Classic Blue", "💚 Earthy Green", "💖 Cute Pink"] },
            { type: "choice", key: "outfit", title: "Your preferred outfit vibe? ✨", options: ["Casual & Comfy", "High Fashion Elegant", "Traditional/Cultural", "Surprise Me!"] },
            { type: "choice", key: "music", title: "Vibe check! Music for the road? 🎵", options: ["Bongo Flava", "Amapiano Vibes", "Smooth R&B", "Energetic Afrobeats"] },
            { type: "choice", key: "food", title: "What's our food craving strategy? 🍕", options: ["Burgers & Fast Food", "Local Swahili Bites", "Sea Food Platter", "Sushi & Asian Cuisine", "Just Drinks & Desserts"] },
            { type: "choice", key: "snack", title: "Movie/Roadtrip companion snack? 🍿", options: ["Sweet Popcorn", "Chocolate Bars", "Hot Chili Bites", "Ice Cream Cup"] },
            { type: "choice", key: "energy", title: "Our general date energy level? ⚡", options: ["Super Chill & Lowkey", "Deep Conversational", "Adventurous & Hyper", "Loud and Laughing"] },
            { type: "choice", key: "photo", title: "Are we taking pictures together? 📸", options: ["Yes, aesthetic couple pics!", "Maybe just casual selfies", "No, let's live in the moment", "Only photos of the food!"] },
            { type: "choice", key: "dessert", title: "Room for dessert afterwards? 🍨", options: ["Always! Dessert is mandatory", "Only if you share with me", "Nope, too full!"] },
            
            // 5 Filling Questions
            { type: "fill", key: "fav_food", title: "What is your absolute favorite dish? 🍛", placeholder: "e.g., Mishkaki, Pizza, Biryani..." },
            { type: "fill", key: "allergy", title: "Any foods or things you're allergic to? ⚠️", placeholder: "e.g., Nuts, Milk, none..." },
            { type: "fill", key: "dream_gift", title: "What is a small thing that always makes you smile? 🎁", placeholder: "e.g., Flowers, Chocolates, Books..." },
            { type: "fill", key: "topic", title: "What's something you love talking about? 💬", placeholder: "e.g., Movies, Dreams, Gossip, Travel..." },
            { type: "fill", key: "date_day", title: "Which date/day works best for you? 📅", placeholder: "e.g., Next Saturday, Sunday evening..." }
        ];

        function unlockMusic() {
            bgMusic.play().catch(error => console.log("Audio play deferred: ", error));
            document.getElementById("music-gate").classList.add("hidden");
            landingPage();
        }

        function landingPage() {
            card.innerHTML = `
                <div class="fade-in space-y-6">
                    <div class="text-6xl animate-pulse">❤️</div>
                    <h1 class="text-3xl md:text-4xl font-black tracking-tight leading-tight drop-shadow-md">
                        Can I Take You Out On A Date?
                    </h1>
                    <p class="text-pink-100 font-medium text-sm md:text-base">
                        I built this little digital space just to ask you...
                    </p>
                    <div class="relative h-32 w-full mt-8 flex items-center justify-center">
                        <button onclick="startQuestions()" class="absolute left-4 bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3.5 rounded-2xl font-bold text-lg shadow-lg transform active:scale-95 transition z-10">
                            YES! 🥰
                        </button>
                        <button id="noBtn" onclick="moveNoButton()" onmouseover="moveNoButton()" class="absolute right-4 bg-gray-800/90 hover:bg-gray-900 text-white px-6 py-3 rounded-xl font-medium text-sm transition-all duration-150 z-20 shadow-md">
                            NO 🙃
                        </button>
                    </div>
                </div>
            `;
        }

        function moveNoButton() {
            const btn = document.getElementById("noBtn");
            const messages = ["NO 🙃", "Are You Sure? 🤔", "Think Again! 😌", "Wrong Button 😂", "Nice Try! 😅", "Still No? 👀", "Access Denied 🤖"];
            
            noCounter++;
            btn.innerText = messages[Math.min(noCounter, messages.length - 1)];

            // Responsively constrain the button within its parent box boundaries
            const containerWidth = card.clientWidth;
            const containerHeight = card.clientHeight;
            
            const maxX = containerWidth - btn.clientWidth - 32;
            const maxY = containerHeight - btn.clientHeight - 100;

            const randomX = Math.max(16, Math.floor(Math.random() * maxX));
            const randomY = Math.max(16, Math.floor(Math.random() * maxY));

            btn.style.position = "absolute";
            btn.style.left = `${randomX}px`;
            btn.style.top = `${randomY}px`;

            if (noCounter >= 7) {
                card.innerHTML = `
                    <div class="fade-in space-y-6">
                        <div class="text-5xl">🤭</div>
                        <h1 class="text-2xl font-bold">Okay, Persistent! Haha</h1>
                        <p class="text-pink-100 text-sm leading-relaxed">
                            Before making your final choice official, please fill out this quick, highly critical planning formula.
                        </p>
                        <button onclick="startQuestions()" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold py-4 rounded-xl shadow-md transition transform active:scale-95">
                            Continue Setup →
                        </button>
                    </div>
                `;
            }
        }

        function startQuestions() {
            currentQuestion = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let interactiveHTML = "";

            if (q.type === "choice") {
                interactiveHTML = `
                    <div class="space-y-2.5 max-h-[280px] overflow-y-auto pr-1">
                        ${q.options.map(option => `
                            <button onclick="answerQuestion('${option}')" class="w-full text-left p-3.5 px-5 bg-white/10 hover:bg-white/20 active:bg-white/30 rounded-xl border border-white/10 transition text-sm font-medium tracking-wide">
                                ${option}
                            </button>
                        `).join("")}
                    </div>
                `;
            } else if (q.type === "fill") {
                interactiveHTML = `
                    <div class="space-y-4">
                        <input type="text" id="customInput" placeholder="${q.placeholder}" autocomplete="off"
                            class="w-full p-4 bg-white/10 border border-white/20 rounded-xl text-white placeholder-pink-200 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 transition text-center" />
                        <button onclick="saveFilledAnswer()" class="w-full bg-white text-rose-600 font-bold py-3.5 rounded-xl text-sm shadow-md transition transform active:scale-95">
                            Next Question Step →
                        </button>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="fade-in space-y-5 flex flex-col justify-between h-full">
                    <div>
                        <div class="w-full bg-white/20 rounded-full h-2 mb-4">
                            <div class="bg-gradient-to-r from-yellow-300 to-pink-400 h-2 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                        </div>
                        <p class="text-xs tracking-wider uppercase opacity-75 font-semibold text-pink-100">
                            Step ${currentQuestion + 1} of ${questions.length}
                        </p>
                    </div>

                    <h2 class="text-xl md:text-2xl font-bold tracking-tight py-2 leading-snug">
                        ${q.title}
                    </h2>

                    ${interactiveHTML}
                </div>
            `;
            
            // Auto focus standard input text boxes if present on screen
            const inputEl = document.getElementById("customInput");
            if(inputEl) inputEl.focus();
        }

        function saveFilledAnswer() {
            const inputVal = document.getElementById("customInput").value.trim();
            if (!inputVal) {
                alert("Please drop a quick line before continuing! Internal planning needs details! 😘");
                return;
            }
            answerQuestion(inputVal);
        }

        function answerQuestion(answer) {
            answers[questions[currentQuestion].key] = answer;
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            card.innerHTML = `
                <div class="fade-in space-y-5 py-2">
                    <div class="text-5xl animate-bounce">💖</div>
                    <h1 class="text-3xl font-black text-white tracking-tight">IT'S A DATE!</h1>
                    <p class="text-xs font-bold text-emerald-300 uppercase tracking-widest bg-emerald-950/40 py-1 px-3 rounded-full inline-block">
                        Date Strategy Complete Plan ✅
                    </p>
                    
                    <div class="bg-black/20 rounded-2xl p-4 text-left text-xs space-y-1.5 max-h-[180px] overflow-y-auto border border-white/5 custom-scrollbar">
                        <p><strong>📍 Outing Type:</strong> ${answers.place}</p>
                        <p><strong>⏰ Preferred Time:</strong> ${answers.time}</p>
                        <p><strong>🎨 Dress Code Tone:</strong> ${answers.color}</p>
                        <p><strong>👗 Wardrobe Style:</strong> ${answers.outfit}</p>
                        <p><strong>🎵 Sound Atmosphere:</strong> ${answers.music}</p>
                        <p><strong>🍽️ Food Strategy:</strong> ${answers.food}</p>
                        <p><strong>🍿 Target Snack:</strong> ${answers.snack}</p>
                        <p><strong>⚡ Vibe Level:</strong> ${answers.energy}</p>
                        <p><strong>📸 Photo Mission:</strong> ${answers.photo}</p>
                        <p><strong>🍨 Sweet Tooth Plan:</strong> ${answers.dessert}</p>
                        <p><strong>🍛 Ultimate Choice Dish:</strong> ${answers.fav_food}</p>
                        <p><strong>⚠️ Health Warnings:</strong> ${answers.allergy}</p>
                        <p><strong>🎁 Smile Trigger:</strong> ${answers.dream_gift}</p>
                        <p><strong>💬 Convo Driver:</strong> ${answers.topic}</p>
                        <p><strong>📅 Proposed Date:</strong> ${answers.date_day}</p>
                    </div>

                    <p class="text-sm text-pink-100 px-2 italic font-medium">
                        "If I could give you one thing in life, it would be the ability to see yourself through my eyes. Then you would know how deeply you are loved, how endlessly you are cherished, and how much happiness you bring into my world" 💖
                    </p>

                    <button onclick="sendToWhatsApp()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-xl flex items-center justify-center space-x-2 text-base tracking-wide transform active:scale-95 transition mt-2">
                        <span>📲 Send to WhatsApp</span>
                    </button>
                </div>
            `;
        }

        function sendToWhatsApp() {
            const phoneNumber = "255718286925";
            let text = `Hey! I finished our Date Plans! Here is our itinerary config ❤️:\n\n`;
            text += `📍 Vibe Destination: ${answers.place}\n`;
            text += `⏰ Day Time: ${answers.time}\n`;
            text += `🎨 Colors To Look Good: ${answers.color}\n`;
            text += `👗 Outfit Mood: ${answers.outfit}\n`;
            text += `🎵 Audio Tracks: ${answers.music}\n`;
            text += `🍽️ Target Food Choice: ${answers.food}\n`;
            text += `🍿 Snack Compadre: ${answers.snack}\n`;
            text += `⚡ Vibe Energy: ${answers.energy}\n`;
            text += `📸 Media/Photos Setup: ${answers.photo}\n`;
            text += `🍨 Dessert Rule: ${answers.dessert}\n`;
            text += `🍛 Favorite Dish: ${answers.fav_food}\n`;
            text += `⚠️ Allergies/No-Go: ${answers.allergy}\n`;
            text += `🎁 Simple Smile Spark: ${answers.dream_gift}\n`;
            text += `💬 Best Convo Spark: ${answers.topic}\n`;
            text += `📅 Proposed Time Slot: ${answers.date_day}\n\n`;
            text += `See you soon! Let's lock this down! ✨🥰`;

            const encodedText = encodeURIComponent(text);
            const url = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedText}`;
            window.open(url, '_blank');
        }

        function createFloatingAssets() {
            const container = document.getElementById("floating-assets");
            const assets = ["❤️", "💖", "✨", "🌸", "🥂", "🎵"];
            const assetCount = 25;

            for (let i = 0; i < assetCount; i++) {
                const el = document.createElement("div");
                el.className = "float-element opacity-0";
                el.innerHTML = assets[Math.floor(Math.random() * assets.length)];
                
                el.style.left = `${Math.random() * 100}vw`;
                el.style.animationDuration = `${6 + Math.random() * 10}s`;
                el.style.animationDelay = `${Math.random() * 8}s`;
                el.style.fontSize = `${16 + Math.random() * 24}px`;
                
                container.appendChild(el);
            }
        }

        createFloatingAssets();
    </script>
</body>
</html>
